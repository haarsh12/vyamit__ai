services:
  - type: web
    name: snapbill-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: snapbill-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: HUGGINGFACE_API_TOKEN
        sync: false
      - key: XAI_GROK_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: VYAMIT_HYBRID_GROK
        value: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: FAST2SMS_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_VERIFY_SERVICE_SID
        sync: false
      - key: API_V1_STR
        value: /api/v1
      - key: PROJECT_NAME
        value: SnapBill Backend
      - key: ENVIRONMENT
        value: production
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: BACKEND_CORS_ORIGINS
        value: https://your-frontend-domain.com,https://snapbill.app

databases:
  - name: snapbill-db
    databaseName: snapbill
    user: snapbill_user
    plan: free